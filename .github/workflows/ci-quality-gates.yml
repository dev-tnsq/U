name: CI Quality Gates

on:
  push:
    branches:
      - main
      - develop
      - release/*
      - feature/**
  pull_request:
    branches:
      - main
      - develop
      - release/*

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile sanity
        run: python -m compileall src tests scripts

      - name: Install pytest
        run: python -m pip install pytest==8.3.5

      - name: Run tests
        run: pytest tests